<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Sniper</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #container { position: relative; width: 90vw; height: 65vh; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); border: 2px solid #333; background: #000; }
        
        /* Видео поток */
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; transition: opacity 0.3s; z-index: 1; }
        
        /* Холст для отображения снимка (зум) */
        #photoCanvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 2; opacity: 0; pointer-events: none; transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.4s; }
        
        /* Свечение во время зума */
        #container.zoomed { box-shadow: 0 0 40px rgb(0, 212, 255); border-color: #00d4ff; }
        #container.zoomed #photoCanvas { opacity: 1; transform: scale(3.5); }
        #container.zoomed video { opacity: 0; }

        .controls { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; z-index: 10; }
        
        button { padding: 15px 30px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; transition: 0.3s; text-transform: uppercase; }
        
        #btn-pick { background: #ff073a; color: white; box-shadow: 0 4px 15px rgba(255, 7, 58, 0.4); }
        #btn-pick:hover:not(:disabled) { background: #cc0000; transform: translateY(-2px); }
        
        #btn-switch { background: #333; color: white; }
        #btn-switch:hover { background: #444; }

        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }
        
        #status { margin-bottom: 15px; font-size: 1rem; color: #ff073a; font-weight: bold; }
        .counter { position: absolute; top: 10px; right: 15px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid #ff073a; z-index: 5; color: #ff073a;}
    </style>
</head>
<body>

    <div id="status">Загрузка ИИ...</div>
    
    <div id="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="photoCanvas"></canvas>
        <div class="counter">Целей: <span id="count">0</span></div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">🔄 Сменить камеру</button>
        <button id="btn-pick" disabled onclick="pickRandom()">🎯 ЗАХВАТ ЦЕЛИ</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const photoCanvas = document.getElementById('photoCanvas');
        const container = document.getElementById('container');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        const countSpan = document.getElementById('count');
        
        let detections = [];
        let currentFacingMode = "user"; 
        let isProcessing = false;

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                status.innerText = "ИИ готов! Жду цели.";
                startStream();
            } catch (e) {
                status.innerText = "Ошибка загрузки ИИ.";
            }
        }

        async function startStream() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: currentFacingMode }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    btnPick.disabled = false;
                    // Подстраиваем размер canvas под размер видео
                    photoCanvas.width = video.videoWidth;
                    photoCanvas.height = video.videoHeight;
                    runDetection();
                };
            } catch (err) {
                status.innerText = "Нет доступа к камере!";
            }
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startStream();
        }

        async function runDetection() {
            setInterval(async () => {
                if (!isProcessing && video.readyState === 4) {
                    const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 });
                    detections = await faceapi.detectAllFaces(video, options);
                    countSpan.innerText = detections.length;
                    
                    if (detections.length > 0) {
                        status.innerText = "Вижу " + detections.length + " целей.";
                        status.style.color = "#ff073a";
                    } else {
                        status.innerText = "Сканирую...";
                        status.style.color = "#ffc107";
                    }
                }
            }, 300);
        }

        // --- ЛОГИКА СНИМКА И ЗУМА ---
        function pickRandom() {
            if (detections.length === 0) return;

            isProcessing = true;
            btnPick.disabled = true;
            status.innerText = "ВЫБОР ЦЕЛИ...";
            
            // 1. Выбираем случайного
            const randomIdx = Math.floor(Math.random() * detections.length);
            const box = detections[randomIdx].box;

            // 2. Делаем мгновенный снимок ВСЕГО кадра на canvas
            const ctx = photoCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);

            // 3. Расчет центра лица для CSS-зума (в процентах)
            const centerX = ((box.x + box.width / 2) / video.videoWidth) * 100;
            const centerY = ((box.y + box.height / 2) / video.videoHeight) * 100;

            // 4. Устанавливаем точку зума для canvas
            photoCanvas.style.transformOrigin = `${centerX}% ${centerY}%`;

            // 5. Включаем анимацию (через CSS класс)
            // Видео скроется, canvas покажет фото и приблизится
            container.classList.add('zoomed');

            // 6. Сброс через 4 секунды
            setTimeout(() => {
                container.classList.remove('zoomed');
                setTimeout(() => {
                    isProcessing = false;
                    btnPick.disabled = false;
                    status.innerText = "ИИ готов.";
                }, 500); // время на исчезновение canvas
            }, 4000);
        }

        window.onload = init;
    </script>
</body>
</html>
