<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Selector Pro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #container { position: relative; width: 90vw; height: 60vh; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0, 123, 255, 0.3); border: 2px solid #333; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.7s cubic-bezier(0.19, 1, 0.22, 1); }
        
        .controls { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        button { padding: 12px 25px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; transition: 0.3s; text-transform: uppercase; }
        
        #btn-pick { background: #28a745; color: white; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4); }
        #btn-pick:hover { background: #218838; transform: translateY(-2px); }
        
        #btn-switch { background: #6c757d; color: white; }
        #btn-switch:hover { background: #5a6268; }

        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; box-shadow: none; }
        
        #status { margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 1px; color: #00d4ff; text-transform: uppercase; }
        .counter { position: absolute; top: 10px; right: 15px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; border: 1px solid #00d4ff; }
    </style>
</head>
<body>

    <div id="status">Инициализация ИИ...</div>
    
    <div id="container">
        <video id="video" autoplay muted playsinline></video>
        <div class="counter">Людей в кадре: <span id="count">0</span></div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">🔄 Сменить камеру</button>
        <button id="btn-pick" disabled onclick="pickRandom()">🎯 ВЫБРАТЬ СЛУЧАЙНОГО</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        const countSpan = document.getElementById('count');
        
        let detections = [];
        let currentFacingMode = "user"; // По умолчанию передняя
        let isZoomed = false;

        // 1. Загрузка моделей
        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                ]);
                status.innerText = "Система готова";
                startStream();
            } catch (e) {
                status.innerText = "Ошибка загрузки моделей";
            }
        }

        // 2. Запуск потока
        async function startStream() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { facingMode: currentFacingMode }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                btnPick.disabled = false;
                runDetection();
            } catch (err) {
                status.innerText = "Доступ к камере отклонен";
            }
        }

        // 3. Переключатель камер
        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            status.innerText = "Переключение камеры...";
            startStream();
        }

        // 4. Детекция лиц
        async function runDetection() {
            setInterval(async () => {
                if (!isZoomed) { // Не считаем во время зума для стабильности
                    detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                    countSpan.innerText = detections.length;
                }
            }, 300);
        }

        // 5. Рандом и Зум
        function pickRandom() {
            if (detections.length === 0) {
                status.innerText = "Никого не вижу!";
                return;
            }

            isZoomed = true;
            btnPick.disabled = true;
            
            const randomPerson = detections[Math.floor(Math.random() * detections.length)];
            const { x, y, width, height } = randomPerson.box;

            // Расчет центра для зума
            const centerX = ((x + width / 2) / video.videoWidth) * 100;
            const centerY = ((y + height / 2) / video.videoHeight) * 100;

            status.innerText = "Выбираю...";
            
            video.style.transformOrigin = `${centerX}% ${centerY}%`;
            video.style.transform = "scale(4)"; 

            setTimeout(() => {
                video.style.transform = "scale(1)";
                isZoomed = false;
                btnPick.disabled = false;
                status.innerText = "Система готова";
            }, 3500);
        }

        init();
    </script>
</body>
</html>
