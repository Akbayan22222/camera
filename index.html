<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medet AI Sniper</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #container { position: relative; width: 95vw; height: 70vh; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(255, 215, 0, 0.2); border: 4px solid #333; }
        
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; transition: opacity 0.3s; }
        
        /* Слой для стоп-кадра с зумом */
        #photoCanvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; opacity: 0; transition: transform 1s cubic-bezier(0.19, 1, 0.22, 1), opacity 0.3s; }
        
        /* Активация зума */
        #container.zoomed #photoCanvas { opacity: 1; transform: scale(8) !important; } /* Сильный зум scale(8) */
        #container.zoomed video { opacity: 0; }
        #container.zoomed { border-color: gold; box-shadow: 0 0 50px gold; }

        .controls { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; z-index: 10; }
        
        button { padding: 15px 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; text-transform: uppercase; transition: 0.3s; }
        
        #btn-pick { background: gold; color: #000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); }
        #btn-pick:hover:not(:disabled) { background: #ffd700cc; transform: scale(1.05); }
        
        #btn-switch { background: #222; color: white; border: 1px solid #444; }

        button:disabled { background: #444 !important; color: #777; cursor: not-allowed; }
        
        #status { margin-bottom: 15px; font-size: 1.1rem; color: #ffd700; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 5px gold; }
        
        .counter { position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid gold; z-index: 5; color: gold; }

        /* --- НОВОЕ: СТИЛИ ДЛЯ ИМЕНИ --- */
        #owner-name { position: absolute; top: 15px; left: 20px; z-index: 5; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; /* Золотистый цвет, не слишком яркий */ color: #cda434; /* Тень для четкости чтения */ text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <div id="status">ЗАГРУЗКА ИИ...</div>
    
    <div id="container">
        <div id="owner-name">MEDET MUHAMEDZHANOV</div>
        
        <video id="video" autoplay muted playsinline></video>
        <canvas id="photoCanvas"></canvas>
        <div class="counter">ГОСТЕЙ: <span id="count">0</span></div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">🔄 КАМЕРА</button>
        <button id="btn-pick" disabled onclick="pickRandom()">🎯 ВЫБРАТЬ ОДНОГО</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const photoCanvas = document.getElementById('photoCanvas');
        const container = document.getElementById('container');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        const countSpan = document.getElementById('count');
        
        let detections = [];
        let currentFacingMode = "user"; 
        let isLock = false;

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                // Загружаем SSD Mobilenet для банкетных условий (много людей)
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                status.innerText = "ИИ ГОТОВ К БАНКЕТУ";
                startStream();
            } catch (e) {
                status.innerText = "ОШИБКА ЗАГРУЗКИ";
            }
        }

        async function startStream() {
            if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: 1920, height: 1080 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    photoCanvas.width = video.videoWidth;
                    photoCanvas.height = video.videoHeight;
                    btnPick.disabled = false;
                    runAI();
                };
            } catch (err) { status.innerText = "ДОСТУП ОТКЛОНЕН"; }
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startStream();
        }

        async function runAI() {
            setInterval(async () => {
                if (!isLock && video.readyState === 4) {
                    detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.45 }));
                    countSpan.innerText = detections.length;
                }
            }, 500);
        }

        function pickRandom() {
            if (detections.length === 0) return;

            isLock = true;
            btnPick.disabled = true;
            
            // Случайный выбор
            const target = detections[Math.floor(Math.random() * detections.length)];
            const { x, y, width, height } = target.box;

            // Мгновенный стоп-кадр
            const ctx = photoCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);

            // Центрирование зума
            const cx = ((x + width / 2) / video.videoWidth) * 100;
            const cy = ((y + height / 2) / video.videoHeight) * 100;

            photoCanvas.style.transformOrigin = `${cx}% ${cy}%`;
            
            status.innerText = "ЕСТЬ КОНТАКТ!";
            container.classList.add('zoomed');

            // Возврат через 5 секунд
            setTimeout(() => {
                container.classList.remove('zoomed');
                setTimeout(() => {
                    isLock = false;
                    btnPick.disabled = false;
                    status.innerText = "ИИ ГОТОВ К БАНКЕТУ";
                }, 800);
            }, 5000);
        }

        window.onload = init;
    </script>
</body>
</html>
