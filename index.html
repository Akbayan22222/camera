<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banket AI Sniper</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #container { position: relative; width: 95vw; height: 75vh; border-radius: 10px; overflow: hidden; border: 4px solid #333; background: #000; }
        
        video { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; }
        
        /* Слой для стоп-кадра с зумом */
        #photoCanvas { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 2; opacity: 0; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s; }
        
        /* Эффект при выборе */
        #container.zoomed #photoCanvas { opacity: 1; transform: scale(7) !important; }
        #container.zoomed { border-color: #00fbff; box-shadow: 0 0 50px #00fbff; }

        .controls { margin-top: 20px; display: flex; gap: 15px; z-index: 10; }
        
        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        #btn-pick { background: linear-gradient(45deg, #00fbff, #007bff); color: #000; }
        #btn-pick:disabled { background: #333; color: #777; cursor: not-allowed; }
        
        #btn-switch { background: #222; color: #fff; border: 1px solid #444; }

        #status { margin-bottom: 10px; font-size: 1rem; color: #00fbff; text-shadow: 0 0 10px #00fbff; }
        .counter { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; border: 2px solid #00fbff; z-index: 5; }
    </style>
</head>
<body>

    <div id="status">ПОДГОТОВКА ИИ...</div>
    
    <div id="container">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="photoCanvas"></canvas>
        <div class="counter">ГОСТЕЙ В КАДРЕ: <span id="count">0</span></div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">КАМЕРА</button>
        <button id="btn-pick" disabled onclick="pickRandom()">ВЫБРАТЬ СЧАСТЛИВЧИКА</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const photoCanvas = document.getElementById('photoCanvas');
        const container = document.getElementById('container');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        const countSpan = document.getElementById('count');
        
        let detections = [];
        let currentFacingMode = "user"; 
        let isLock = false;

        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                // Модель SSDMobilenet — лучшая для распознавания людей на банкетах (даже со спины)
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                status.innerText = "ИИ ГОТОВ К БАНКЕТУ";
                startStream();
            } catch (e) {
                status.innerText = "ОШИБКА ЗАГРУЗКИ";
            }
        }

        async function startStream() {
            if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: 1920, height: 1080 } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    photoCanvas.width = video.videoWidth;
                    photoCanvas.height = video.videoHeight;
                    btnPick.disabled = false;
                    runAI();
                };
            } catch (err) {
                status.innerText = "ПРОВЕРЬТЕ ДОСТУП К КАМЕРЕ";
            }
        }

        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            startStream();
        }

        async function runAI() {
            setInterval(async () => {
                if (!isLock && video.readyState === 4) {
                    // Ищем людей. Порог 0.4 позволяет видеть тех, кто не смотрит в камеру
                    detections = await faceapi.detectAllFaces(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 }));
                    countSpan.innerText = detections.length;
                }
            }, 500);
        }

        function pickRandom() {
            if (detections.length === 0) {
                status.innerText = "НИКОГО НЕ ВИЖУ";
                return;
            }

            isLock = true;
            btnPick.disabled = true;
            
            // Рандомный выбор одного гостя
            const target = detections[Math.floor(Math.random() * detections.length)];
            const { x, y, width, height } = target.box;

            // Мгновенный стоп-кадр
            const ctx = photoCanvas.getContext('2d');
            ctx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);

            // Точка зума — центр силуэта выбранного человека
            const cx = ((x + width / 2) / video.videoWidth) * 100;
            const cy = ((y + height / 2) / video.videoHeight) * 100;

            photoCanvas.style.transformOrigin = `${cx}% ${cy}%`;
            
            status.innerText = "ЕСТЬ КОНТАКТ!";
            container.classList.add('zoomed');

            // Показываем фото 6 секунд, потом возвращаемся к видео
            setTimeout(() => {
                container.classList.remove('zoomed');
                setTimeout(() => {
                    isLock = false;
                    btnPick.disabled = false;
                    status.innerText = "ИИ ГОТОВ К БАНКЕТУ";
                }, 1000);
            }, 6000);
        }

        window.onload = init;
    </script>
</body>
</html>
