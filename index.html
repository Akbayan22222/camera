<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Selector Pro</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; background: #0f0f0f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        #container { position: relative; width: 90vw; height: 60vh; border-radius: 20px; overflow: hidden; box-shadow: 0 0 30px rgba(0, 123, 255, 0.3); border: 2px solid #333; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.19, 1, 0.22, 1); }
        
        .controls { margin-top: 25px; display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        button { padding: 15px 30px; font-size: 1rem; font-weight: bold; cursor: pointer; border: none; border-radius: 12px; transition: 0.3s; text-transform: uppercase; }
        
        #btn-pick { background: #28a745; color: white; box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4); }
        #btn-pick:hover:not(:disabled) { background: #218838; transform: translateY(-2px); }
        
        #btn-switch { background: #6c757d; color: white; }
        
        button:disabled { background: #444 !important; cursor: not-allowed; opacity: 0.5; }
        
        #status { margin-bottom: 15px; font-size: 1rem; color: #00d4ff; font-weight: bold; }
        .counter { position: absolute; top: 10px; right: 15px; background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; border: 1px solid #00d4ff; z-index: 5; }
    </style>
</head>
<body>

    <div id="status">Загрузка моделей ИИ...</div>
    
    <div id="container">
        <video id="video" autoplay muted playsinline></video>
        <div class="counter">Людей: <span id="count">0</span></div>
    </div>

    <div class="controls">
        <button id="btn-switch" onclick="toggleCamera()">🔄 Сменить камеру</button>
        <button id="btn-pick" disabled onclick="pickRandom()">🎯 ВЫБРАТЬ СЛУЧАЙНОГО</button>
    </div>

    <script>
        const video = document.getElementById('video');
        const btnPick = document.getElementById('btn-pick');
        const status = document.getElementById('status');
        const countSpan = document.getElementById('count');
        
        let detections = [];
        let currentFacingMode = "user"; 
        let isZoomed = false;

        // 1. Загрузка моделей (используем надежный источник)
        async function init() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            
            try {
                // Загружаем только необходимые модели для скорости
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                status.innerText = "Система готова! Жду лица...";
                startStream();
            } catch (e) {
                console.error(e);
                status.innerText = "Ошибка загрузки ИИ. Проверь интернет.";
            }
        }

        // 2. Запуск видеопотока
        async function startStream() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: { 
                    facingMode: currentFacingMode,
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Ждем, пока видео реально начнет воспроизводиться
                video.onloadedmetadata = () => {
                    btnPick.disabled = false;
                    runDetection();
                };
            } catch (err) {
                status.innerText = "Нет доступа к камере!";
            }
        }

        // 3. Переключение камеры
        function toggleCamera() {
            currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
            status.innerText = "Смена камеры...";
            startStream();
        }

        // 4. Детекция лиц (оптимизировано)
        async function runDetection() {
            setInterval(async () => {
                if (!isZoomed && video.readyState === 4) {
                    // Используем быстрые настройки детектора
                    const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.3 });
                    detections = await faceapi.detectAllFaces(video, options);
                    countSpan.innerText = detections.length;
                    
                    if (detections.length > 0) {
                        status.innerText = "Вижу " + detections.length + " чел.";
                        status.style.color = "#28a745";
                    } else {
                        status.innerText = "Никого не вижу...";
                        status.style.color = "#ffc107";
                    }
                }
            }, 400); // Опрашиваем чуть реже, чтобы не тормозило
        }

        // 5. Логика выбора и анимации
        function pickRandom() {
            if (detections.length === 0) return;

            isZoomed = true;
            btnPick.disabled = true;
            
            // Выбираем случайный объект из найденных лиц
            const randomIdx = Math.floor(Math.random() * detections.length);
            const box = detections[randomIdx].box;

            // Расчет центральной точки для зума
            const centerX = ((box.x + box.width / 2) / video.videoWidth) * 100;
            const centerY = ((box.y + box.height / 2) / video.videoHeight) * 100;

            status.innerText = "ВЫБРАН СЛУЧАЙНЫЙ!";
            status.style.color = "#00d4ff";
            
            // Применяем плавное приближение
            video.style.transformOrigin = `${centerX}% ${centerY}%`;
            video.style.transform = "scale(3.5)"; 

            // Возврат в исходное состояние через 4 секунды
            setTimeout(() => {
                video.style.transform = "scale(1)";
                isZoomed = false;
                btnPick.disabled = false;
                status.innerText = "Система готова";
            }, 4000);
        }

        // Запуск приложения
        window.onload = init;
    </script>
</body>
</html>
